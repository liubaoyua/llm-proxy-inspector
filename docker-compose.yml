services:
  llm-proxy-inspector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-proxy-inspector
    restart: unless-stopped
    ports:
      - "7654:7654"
      - "7655:7655"
    environment:
      UPSTREAM_BASE: http://host.docker.internal:8080
      PROXY_PORT: "7654"
      UI_PORT: "7655"
      MAX_RECORDS: "5000"
      SESSION_PAGE_SIZE: "100"
      DB_PATH: /app/data/proxy.db
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
