<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>LLM Proxy Inspector</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

:root {
  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --border:    #e2e0d8;
  --border2:   #ccc9be;
  --text:      #1a1916;
  --text2:     #6b6860;
  --text3:     #9b9890;
  --accent:    #2a5bd7;
  --accent-bg: #eef2fd;
  --accent-bd: #c5d3f8;
  --green:     #1a7f4b;
  --green-bg:  #e6f6ed;
  --red:       #c0392b;
  --red-bg:    #fdecea;
  --yellow:    #92600a;
  --yellow-bg: #fef3dc;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'DM Sans', sans-serif;
  --radius:    8px;
  --sidebar-w: 320px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 13px;
}
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-head {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
}
#sidebar-head h1 {
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
#sidebar-head h1 .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 2px var(--green-bg);
}
#sidebar-meta {
  margin-top: 5px;
  font-size: 11px;
  color: var(--text3);
  display: flex;
  gap: 10px;
  align-items: center;
}
.sidebar-filters {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sidebar-filter-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.sidebar-filter-input,
.sidebar-filter-select,
.sidebar-filter-clear {
  width: 100%;
  min-width: 0;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font: inherit;
}
.sidebar-filter-input,
.sidebar-filter-select {
  padding: 0 10px;
}
.sidebar-filter-input::placeholder {
  color: var(--text3);
}
.sidebar-filter-input:focus,
.sidebar-filter-select:focus {
  outline: none;
  border-color: var(--accent-bd);
  box-shadow: 0 0 0 3px rgba(42, 91, 215, 0.08);
}
.sidebar-filter-clear {
  cursor: pointer;
  background: var(--surface);
  font-weight: 500;
}
.sidebar-filter-clear:hover {
  background: var(--accent-bg);
  border-color: var(--accent-bd);
  color: var(--accent);
}
#sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.record-group {
  border-bottom: 1px solid var(--bg);
}
#sidebar-list::-webkit-scrollbar,
.turn-list::-webkit-scrollbar,
#chunks-view::-webkit-scrollbar,
.session-json-wrap::-webkit-scrollbar {
  width: 10px;
}
#sidebar-list::-webkit-scrollbar-thumb,
.turn-list::-webkit-scrollbar-thumb,
#chunks-view::-webkit-scrollbar-thumb,
.session-json-wrap::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 2px;
}
.record-item {
  padding: 9px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  border-bottom: 1px solid var(--bg);
  transition: background .1s;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 4px 8px;
  align-items: start;
}
.record-item:hover  { background: var(--bg); }
.record-item.active { background: var(--accent-bg); border-left-color: var(--accent); }
.ri-method {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  padding: 2px 5px;
  border-radius: 3px;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent-bd);
  align-self: center;
}
.ri-path {
  font-size: 11.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ri-status {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  align-self: center;
}
.ri-status.ok { color: var(--green); }
.ri-status.err { color: var(--red); }
.ri-status.pending { color: var(--text3); }
.ri-meta {
  grid-column: 2 / -1;
  font-size: 10.5px;
  color: var(--text3);
  display: flex;
  gap: 8px;
  align-items: center;
}
.ri-badge {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 9.5px;
  font-weight: 500;
  background: var(--yellow-bg);
  color: var(--yellow);
  border: 1px solid #f0d9a0;
}
.ri-badge.sse { background: var(--green-bg); color: var(--green); border-color: #a8dfbe; }
.session-preview {
  grid-column: 2 / -1;
  color: var(--text2);
  font-size: 10.5px;
  line-height: 1.45;
}
.record-turns {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 6px 10px 10px 18px;
  background: linear-gradient(180deg, rgba(238, 242, 253, 0.5), rgba(255, 255, 255, 0));
}
.record-turn-item {
  width: 100%;
  padding: 7px 10px;
  border-radius: 8px;
  text-align: left;
  display: grid;
  grid-template-columns: auto auto 1fr;
  gap: 6px;
  align-items: center;
  color: var(--text2);
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid transparent;
  cursor: pointer;
}
.record-turn-item:hover {
  background: var(--surface);
  border-color: var(--border);
}
.record-turn-item.active {
  background: var(--surface);
  border-color: var(--accent-bd);
  box-shadow: inset 0 0 0 1px rgba(42, 91, 215, 0.08);
  color: var(--text);
}
.record-turn-index,
.record-turn-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
}
.record-turn-label {
  min-width: 0;
  font-size: 10.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
#toolbar {
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
}
#toolbar-path {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--text2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#toolbar-model {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-bg);
  border: 1px solid var(--accent-bd);
  padding: 2px 8px;
  border-radius: 99px;
}
.latency-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 4px;
}
.usage-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 4px;
}
.stream-badge {
  font-size: 9.5px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid #a8dfbe;
}
#tabbar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.tb {
  padding: 9px 14px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  user-select: none;
}
.tb.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
#content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; flex-direction: column; }
#empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--text3);
}
#empty .big { font-size: 28px; }
#clear-btn,
.copy-btn {
  margin-left: auto;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border: 1px solid var(--border2);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  font-family: var(--sans);
}
#clear-btn:hover { background: var(--red-bg); color: var(--red); border-color: #e8b4b0; }
.copy-btn:hover { background: var(--bg); }
pre {
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.turn-list,
.session-json-wrap,
#chunks-view {
  flex: 1;
  overflow-y: auto;
}
.turn-list {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.turn-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  max-height: calc(100dvh - 120px);
  scroll-margin-top: 14px;
}
.turn-card.selected {
  border-color: var(--accent-bd);
  box-shadow: 0 0 0 2px rgba(42, 91, 215, 0.12);
}
.turn-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface), var(--bg));
  font-size: 11px;
  color: var(--text2);
}
.turn-index {
  font-family: var(--mono);
  color: var(--accent);
  font-weight: 600;
}
.turn-meta {
  margin-left: auto;
  color: var(--text3);
  font-size: 10.5px;
}
.turn-list.multi-turn .turn-card {
  height: calc(100dvh - 120px);
  max-height: calc(100dvh - 120px);
}
.turn-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 0;
}
.turn-list.multi-turn .turn-split {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.turn-pane {
  min-width: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.turn-pane:last-child { border-right: none; }
.turn-list.multi-turn .turn-pane {
  border-right: none;
  min-height: 0;
}
.turn-list.multi-turn .turn-pane.request-pane {
  flex: 1 1 auto;
}
.turn-list.multi-turn .turn-pane.response-pane {
  flex: 0 0 auto;
  max-height: 50%;
}
.turn-list.multi-turn .turn-pane + .turn-pane {
  border-top: 1px solid var(--border);
}
.turn-pane-head {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.turn-pane-body {
  padding: 12px;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}
.turn-list.multi-turn .turn-pane-body {
  flex: 1 1 auto;
  overflow-y: auto;
}
.turn-list.multi-turn .turn-pane.response-pane .turn-pane-body {
  flex: 0 0 auto;
}
.msg-list { display: flex; flex-direction: column; gap: 10px; }
.msg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.msg-card-head {
  padding: 6px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .08em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.role-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.role-dot.user { background: var(--accent); }
.role-dot.assistant { background: var(--green); }
.role-dot.system { background: var(--yellow); }
.role-dot.tool { background: var(--red); }
.msg-card-body {
  padding: 10px 12px;
  font-size: 12.5px;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 320px;
  overflow: auto;
}
.reasoning-block,
.tool-calls-block {
  margin-top: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.reasoning-toggle,
.tool-calls-toggle {
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.reasoning-toggle {
  background: var(--yellow-bg);
  border-bottom: 1px solid #f0d9a0;
  color: var(--yellow);
}
.tool-calls-toggle {
  background: var(--accent-bg);
  border-bottom: 1px solid var(--accent-bd);
  color: var(--accent);
}
.reasoning-toggle::before,
.tool-calls-toggle::before {
  content: '▶';
  font-size: 8px;
  transition: transform .2s;
}
.reasoning-toggle.open::before,
.tool-calls-toggle.open::before {
  transform: rotate(90deg);
}
.reasoning-body,
.tool-calls-body {
  display: none;
}
.reasoning-body.open,
.tool-calls-body.open {
  display: block;
}
.reasoning-body {
  padding: 10px 12px;
  color: var(--text2);
  white-space: pre-wrap;
  max-height: 320px;
  overflow: auto;
}
.tool-calls-body { padding: 8px 12px; }
.tool-call-item {
  margin-bottom: 8px;
  border: 1px solid var(--accent-bd);
  border-radius: 6px;
  overflow: hidden;
}
.tool-call-name {
  padding: 4px 10px;
  background: var(--accent-bg);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  border-bottom: 1px solid var(--accent-bd);
}
.tool-call-args {
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 280px;
  overflow: auto;
}
.chunk-line {
  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--text2);
  border-bottom: 1px solid var(--bg);
  padding: 2px 14px;
}
.chunk-line.data { color: var(--text); }
.chunk-line.done { color: var(--green); font-weight: 500; }
.chunk-line.empty { opacity: .3; }
.section-head {
  padding: 8px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 8px;
}
@media (max-width: 980px) {
  #sidebar { width: 250px; }
  .sidebar-filter-row { grid-template-columns: 1fr; }
  .turn-split { grid-template-columns: 1fr; }
  .turn-card { max-height: none; }
  .turn-pane {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .turn-pane:last-child { border-bottom: none; }
}
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-head">
    <h1><span class="dot"></span> LLM Proxy Inspector</h1>
    <div id="sidebar-meta">
      <span id="count-badge">0 个会话</span>
      <button id="clear-btn" onclick="clearHistory()">清除</button>
    </div>
    <div class="sidebar-filters">
      <input id="filter-query" class="sidebar-filter-input" placeholder="搜索文本 / model / 方法">
      <div class="sidebar-filter-row">
        <input id="filter-path" class="sidebar-filter-input" placeholder="过滤 path">
        <input id="filter-ip" class="sidebar-filter-input" placeholder="过滤 IP">
      </div>
      <div class="sidebar-filter-row">
        <select id="filter-status" class="sidebar-filter-select">
          <option value="all">全部状态</option>
          <option value="ok">成功</option>
          <option value="err">错误</option>
          <option value="pending">进行中</option>
        </select>
        <button type="button" class="sidebar-filter-clear" onclick="clearFilters()">清空</button>
      </div>
    </div>
  </div>
  <div id="sidebar-list">
    <div id="list-empty" style="padding:20px 14px;color:var(--text3);font-size:12px">等待请求…</div>
  </div>
</div>

<div id="main">
  <div id="empty" style="display:flex">
    <div class="big">🔍</div>
    <p>从左侧选择一个会话</p>
  </div>

  <div id="detail" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
    <div id="toolbar">
      <span id="toolbar-path">—</span>
      <span id="toolbar-model" style="display:none"></span>
      <span id="toolbar-latency" class="latency-badge" style="display:none"></span>
      <span id="toolbar-usage" class="usage-badge" style="display:none"></span>
      <span id="toolbar-stream" class="stream-badge" style="display:none">SSE Stream</span>
    </div>

    <div id="tabbar">
      <div class="tb active" data-panel="pretty" onclick="switchTab(this)">消息</div>
      <div class="tb" data-panel="raw-json" onclick="switchTab(this)">Session JSON</div>
      <div class="tb" data-panel="chunks" id="tab-chunks" onclick="switchTab(this)" style="display:none">SSE Chunks</div>
    </div>

    <div id="content">
      <div id="panel-pretty" class="panel active">
        <div id="session-turns" class="turn-list"></div>
      </div>

      <div id="panel-raw-json" class="panel">
        <div class="section-head">
          当前会话 JSON
          <button class="copy-btn" onclick="copyText(document.getElementById('session-raw').textContent, this)">复制</button>
        </div>
        <div class="session-json-wrap">
          <pre id="session-raw"></pre>
        </div>
      </div>

      <div id="panel-chunks" class="panel">
        <div class="section-head">
          当前会话的 SSE 数据
          <button class="copy-btn" onclick="copyText(document.getElementById('chunks-view').innerText, this)">复制</button>
        </div>
        <div id="chunks-view"></div>
      </div>
    </div>
  </div>
</div>

<script>
let currentSessionId = null;
let currentSession = null;
let currentRecord = null;
let currentRecordId = null;
let sessions = [];

function currentSessionNeedsRefresh() {
  if (!currentSessionId) return false;

  const activeSession = sessions.find(s => s.id === currentSessionId);
  if (activeSession) return !activeSession.done;

  return !(currentSession && currentSession.session && currentSession.session.done);
}

function routeFromUrl() {
  let m = location.pathname.match(/^\/sessions\/(.+)/);
  if (m) return { type: 'session', id: m[1] };
  m = location.pathname.match(/^\/ids\/(.+)/);
  if (m) return { type: 'record', id: m[1] };
  return null;
}

async function sessionIdFromUrl() {
  const route = routeFromUrl();
  if (!route) return null;
  if (route.type === 'session') return route.id;
  try {
    const res = await fetch('/api/records/' + route.id);
    if (!res.ok) return null;
    const record = await res.json();
    return record.session_id || null;
  } catch {
    return null;
  }
}

async function refreshSidebar() {
  const query = document.getElementById('filter-query')?.value.trim().toLowerCase() || '';
  const pathFilter = document.getElementById('filter-path')?.value.trim().toLowerCase() || '';
  const ipFilter = document.getElementById('filter-ip')?.value.trim().toLowerCase() || '';
  const statusFilter = document.getElementById('filter-status')?.value || 'all';

  try {
    const res = await fetch('/api/sessions');
    sessions = await res.json();
  } catch {
    return;
  }

  document.getElementById('count-badge').textContent = sessions.length + ' 个会话';

  const list = document.getElementById('sidebar-list');
  if (!sessions.length) {
    list.innerHTML = '<div id="list-empty" style="padding:20px 14px;color:var(--text3);font-size:12px">等待请求…</div>';
    return;
  }

  const filteredSessions = sessions.filter(s => {
    const statusCls = s.status == null ? 'pending' : (s.status < 400 ? 'ok' : 'err');
    if (statusFilter !== 'all' && statusCls !== statusFilter) return false;

    const normalizedPath = String(s.path || '').toLowerCase();
    const normalizedIp = String(s.client_ip || '').toLowerCase();
    const haystack = [
      s.path,
      s.preview || '',
      s.model || '',
      s.method,
      s.last_time,
      s.client_ip || '',
    ].join(' ').toLowerCase();

    if (query && !haystack.includes(query)) return false;
    if (pathFilter && !normalizedPath.includes(pathFilter)) return false;
    if (ipFilter && !normalizedIp.includes(ipFilter)) return false;
    return true;
  });

  if (!filteredSessions.length) {
    list.innerHTML = `<div id="list-empty" style="padding:20px 14px;color:var(--text3);font-size:12px">${sessions.length ? '没有匹配的会话' : '等待请求…'}</div>`;
    return;
  }

  const activeRecords = currentSession && currentSessionId && currentSession.session && currentSession.session.id === currentSessionId
    ? (currentSession.records || [])
    : [];

  list.innerHTML = filteredSessions.map(s => {
    const active = s.id === currentSessionId ? 'active' : '';
    const statusCls = s.status == null ? 'pending' : (s.status < 400 ? 'ok' : 'err');
    const statusTxt = s.status == null ? '…' : s.status;
    const latency = s.latency != null ? s.latency + 'ms' : '';
    const badge = s.is_sse ? '<span class="ri-badge sse">SSE</span>' : '';
    const model = s.model ? `<span style="font-size:10px;color:var(--accent)">${esc(s.model.split('/').pop())}</span>` : '';
    const ip = s.client_ip ? `<span>${esc(s.client_ip)}</span>` : '';
    const preview = s.preview ? `<div class="session-preview">${esc(s.preview)}</div>` : '';
    const turns = active && activeRecords.length > 1
      ? `<div class="record-turns">${activeRecords.map((record, index) => {
          const recordActive = record.id === currentRecordId ? 'active' : '';
          return `
            <button type="button" class="record-turn-item ${recordActive}" onclick="selectRecord('${escAttr(record.id)}', event)">
              <span class="record-turn-index">#${index + 1}</span>
              <span class="record-turn-time">${esc(record.time)}</span>
              <span class="record-turn-label">${esc(getRecordPreview(record) || record.path)}</span>
            </button>`;
        }).join('')}</div>`
      : '';
    return `
<div class="record-group">
  <div class="record-item ${active}" onclick="selectSession('${escAttr(s.id)}')">
    <span class="ri-method">${s.record_count}</span>
    <span class="ri-path">${esc(s.path)}</span>
    <span class="ri-status ${statusCls}">${statusTxt}</span>
    <div class="ri-meta">${model}${badge}${ip}<span>${esc(s.last_time)}${latency ? ' · ' + latency : ''}</span></div>
    ${preview}
  </div>
  ${turns}
</div>`;
  }).join('');
}

async function selectSession(id) {
  currentSessionId = id;
  currentRecordId = null;
  history.replaceState(null, '', '/sessions/' + id);
  await refreshSidebar();
  await refreshCurrentSession();
}

function selectRecord(recordId, event) {
  if (event) event.stopPropagation();
  currentRecordId = recordId;
  history.replaceState(null, '', '/ids/' + recordId);
  currentRecord = (currentSession?.records || []).find(record => record.id === recordId) || currentRecord;
  refreshSidebar();
  if (currentSession) {
    renderDetail(currentSession);
    highlightSelectedTurn(true);
  }
}

async function refreshCurrentSession() {
  if (!currentSessionId) return;
  try {
    const res = await fetch('/api/sessions/' + currentSessionId);
    if (!res.ok) return;
    currentSession = await res.json();
    const records = currentSession.records || [];
    currentRecord = records.find(record => record.id === currentRecordId) || records[records.length - 1] || null;
    currentRecordId = currentRecord ? currentRecord.id : null;
  } catch {
    return;
  }

  renderDetail(currentSession);
  await refreshSidebar();
}

function renderDetail(payload) {
  const session = payload.session;
  const records = payload.records || [];
  const isMultiTurn = records.length > 1;
  const selected = records.find(record => record.id === currentRecordId) || records[records.length - 1] || null;
  currentRecord = selected;
  currentRecordId = selected ? selected.id : null;
  const visibleRecords = selected ? [selected] : [];

  document.getElementById('empty').style.display = 'none';
  document.getElementById('detail').style.display = 'flex';

  document.getElementById('toolbar-path').textContent = `${session.path} · ${records.length} turns`;

  const modelEl = document.getElementById('toolbar-model');
  if (session.model) {
    modelEl.textContent = session.model.split('/').pop();
    modelEl.style.display = '';
  } else {
    modelEl.style.display = 'none';
  }

  const latEl = document.getElementById('toolbar-latency');
  if (selected && selected.latency != null) {
    latEl.textContent = selected.latency + ' ms';
    latEl.style.display = '';
  } else {
    latEl.style.display = 'none';
  }

  const usageEl = document.getElementById('toolbar-usage');
  const usageText = selected ? formatUsage(getUsage(selected)) : '';
  if (usageText) {
    usageEl.textContent = usageText;
    usageEl.style.display = '';
  } else {
    usageEl.style.display = 'none';
  }

  const hasSse = records.some(r => r.is_sse);
  document.getElementById('toolbar-stream').style.display = hasSse ? '' : 'none';
  document.getElementById('tab-chunks').style.display = hasSse ? '' : 'none';

  const turnsEl = document.getElementById('session-turns');
  turnsEl.classList.toggle('multi-turn', isMultiTurn);
  turnsEl.innerHTML = visibleRecords.map((record) => {
    const turnIndex = records.findIndex(item => item.id === record.id) + 1;
    return renderTurn(record, turnIndex, true, isMultiTurn);
  }).join('');

  document.getElementById('session-raw').textContent = JSON.stringify(payload, null, 2) || '(empty)';
  renderChunks(records.filter(r => r.is_sse));
  highlightSelectedTurn(false);

  const activeTab = document.querySelector('.tb.active');
  if (activeTab) switchTab(activeTab, true);
}

function renderTurn(record, turnIndex, isSelected, isMultiTurn) {
  const reqJson = record.req_json || {};
  const messages = reqJson.messages || [];
  const reqHtml = messages.length
    ? messages.map(m => msgCard(m.role, m.content, null, m.tool_calls)).join('')
    : `<pre>${esc(JSON.stringify(reqJson, null, 2))}</pre>`;
  const respHtml = renderResponse(record);
  const parts = [
    record.time,
    record.method,
    record.status == null ? 'pending' : String(record.status),
    record.latency != null ? record.latency + 'ms' : null,
    record.client_ip || null,
  ].filter(Boolean);
  const usageText = formatUsage(getUsage(record));
  const cls = [
    'turn-card',
    isSelected ? 'selected' : '',
    isMultiTurn ? 'multi-turn' : '',
  ].filter(Boolean).join(' ');

  return `
<div class="${cls}" id="turn-${escAttr(record.id)}">
  <div class="turn-head">
    <span class="turn-index">#${turnIndex}</span>
    <span>${esc(record.path)}</span>
    <span class="turn-meta">${esc(parts.join(' · '))}${usageText ? ' · ' + esc(usageText) : ''}</span>
  </div>
  <div class="turn-split">
    <div class="turn-pane request-pane">
      <div class="turn-pane-head">Request</div>
      <div class="turn-pane-body"><div class="msg-list">${reqHtml}</div></div>
    </div>
    <div class="turn-pane response-pane">
      <div class="turn-pane-head">Response</div>
      <div class="turn-pane-body"><div class="msg-list">${respHtml}</div></div>
    </div>
  </div>
</div>`;
}

function getUsage(record) {
  const payload = (record && (record.resp_merged || record.resp_json)) || null;
  if (!payload || typeof payload !== 'object') return null;
  const usage = payload.usage;
  return usage && typeof usage === 'object' ? usage : null;
}

function formatUsage(usage) {
  if (!usage) return '';

  const input = usage.input_tokens ?? usage.prompt_tokens ?? usage.prompt_token_count ?? null;
  const output = usage.output_tokens ?? usage.completion_tokens ?? usage.output_token_count ?? null;
  const total = usage.total_tokens ?? usage.total_token_count ?? (
    Number.isFinite(input) && Number.isFinite(output) ? input + output : null
  );

  const parts = [];
  if (Number.isFinite(input)) parts.push(`in ${formatNumber(input)}`);
  if (Number.isFinite(output)) parts.push(`out ${formatNumber(output)}`);
  if (Number.isFinite(total)) parts.push(`total ${formatNumber(total)}`);
  return parts.join(' · ');
}

function formatNumber(value) {
  return new Intl.NumberFormat('en-US').format(value);
}

function renderResponse(record) {
  if (record.is_sse && record.resp_merged) {
    const choices = normalizeResponseChoices(record.resp_merged);
    return choices.map(c => msgCard(c.role || 'assistant', c.content, c.reasoning_content, c.tool_calls)).join('')
      || '<span style="color:var(--text3);font-size:12px">流式响应解析中…</span>';
  }
  if (record.resp_json) {
    const choices = normalizeResponseChoices(record.resp_json);
    if (choices.length) {
      return choices.map(c => {
        const msg = c.message || {};
        return msgCard(
          msg.role || c.role || 'assistant',
          msg.content ?? c.content,
          msg.reasoning_content ?? c.reasoning_content,
          msg.tool_calls ?? c.tool_calls,
        );
      }).join('');
    }
    return `<pre>${esc(JSON.stringify(record.resp_json, null, 2))}</pre>`;
  }
  if (record.resp_raw) return `<pre>${esc(record.resp_raw)}</pre>`;
  return '<span style="color:var(--text3);font-size:12px">等待响应…</span>';
}

function normalizeResponseChoices(payload) {
  if (!payload || typeof payload !== 'object') return [];
  if (Array.isArray(payload.choices)) return payload.choices;

  const output = Array.isArray(payload.output) ? payload.output : [];
  if (!output.length) return [];

  let role = 'assistant';
  let content = '';
  let reasoning = '';
  const toolCalls = [];

  output.forEach(item => {
    if (!item || typeof item !== 'object') return;
    if (item.type === 'message') {
      role = item.role || role;
      const parts = Array.isArray(item.content) ? item.content : [];
      content += parts
        .filter(part => part && part.type === 'output_text')
        .map(part => part.text || '')
        .join('');
    } else if (item.type === 'reasoning') {
      const parts = Array.isArray(item.summary) ? item.summary : [];
      const text = parts
        .filter(part => part && typeof part.text === 'string' && part.text)
        .map(part => part.text)
        .join('\n');
      if (text) reasoning += (reasoning ? '\n' : '') + text;
    } else if (item.type === 'function_call') {
      toolCalls.push({
        id: item.call_id || item.id,
        type: 'function',
        function: {
          name: item.name || item.id || '(unknown)',
          arguments: item.arguments || '',
        },
      });
    }
  });

  return [{
    role,
    content,
    reasoning_content: reasoning || null,
    tool_calls: toolCalls,
  }];
}

function renderChunks(sseRecords) {
  const cv = document.getElementById('chunks-view');
  if (!sseRecords.length) {
    cv.innerHTML = '<div style="padding:14px;color:var(--text3);font-size:12px">当前会话没有 SSE 数据</div>';
    return;
  }

  cv.innerHTML = sseRecords.map((record, idx) => {
    const lines = record.sse_lines || [];
    const block = lines.map(line => {
      const trimmed = line.trim();
      let cls = 'empty';
      if (trimmed === 'data: [DONE]') cls = 'done';
      else if (trimmed.startsWith('data:')) cls = 'data';
      else if (trimmed) cls = '';
      return `<div class="chunk-line ${cls}">${esc(line)}</div>`;
    }).join('');
    return `<div style="padding:12px 14px 6px;color:var(--text3);font-size:11px">#${idx + 1} · ${esc(record.time)} · ${esc(record.path)}</div>${block}`;
  }).join('');
}

function highlightSelectedTurn(scroll) {
  document.querySelectorAll('.turn-card.selected').forEach(el => el.classList.remove('selected'));
  if (!currentRecordId) return;
  const el = document.getElementById('turn-' + currentRecordId);
  if (!el) return;
  el.classList.add('selected');
  if (scroll) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function getRecordPreview(record) {
  const reqJson = (record && record.req_json) || {};
  const messages = Array.isArray(reqJson.messages) ? reqJson.messages : [];
  const lastContent = messages[messages.length - 1]?.content;
  return stringifyPreview(lastContent) || record.path || '';
}

function stringifyPreview(content) {
  if (typeof content === 'string') {
    return content.replace(/\s+/g, ' ').trim();
  }
  if (Array.isArray(content)) {
    return content
      .map(block => block && typeof block === 'object' && block.type === 'text' ? String(block.text || '') : '')
      .filter(Boolean)
      .join(' ')
      .replace(/\s+/g, ' ')
      .trim();
  }
  if (content == null) return '';
  return String(content).replace(/\s+/g, ' ').trim();
}

function msgCard(role, content, reasoning, toolCalls) {
  const dotCls = ['user', 'assistant', 'system', 'tool'].includes(role) ? role : 'user';
  let bodyHtml = '';

  if (role === 'tool') {
    const parts = Array.isArray(content) ? content : null;
    const text = parts ? parts.map(p => p.text ?? JSON.stringify(p)).join('\n') : (content || '');
    bodyHtml = `<div class="msg-card-body">${esc(text)}</div>`;
  } else if (Array.isArray(content)) {
    bodyHtml = content.map(block => {
      if (block.type === 'text') return `<div class="msg-card-body">${esc(block.text || '')}</div>`;
      return `<div class="msg-card-body" style="color:var(--text2);font-size:11px">[${esc(block.type || 'block')}]</div>`;
    }).join('');
  } else {
    bodyHtml = `<div class="msg-card-body">${esc(content || '')}</div>`;
  }

  let html = `
<div class="msg-card">
  <div class="msg-card-head">
    <span class="role-dot ${dotCls}"></span>${esc(role)}
  </div>
  ${bodyHtml}`;

  if (reasoning) {
    html += `
  <div class="reasoning-block">
    <div class="reasoning-toggle open" onclick="toggleBlock(this)">思考链</div>
    <div class="reasoning-body open">${esc(reasoning)}</div>
  </div>`;
  }

  if (toolCalls && toolCalls.length) {
    const itemsHtml = toolCalls.map(tc => {
      const fn = tc.function || {};
      const name = fn.name || tc.name || tc.id || '(unknown)';
      let args = fn.arguments ?? tc.arguments ?? '';
      try { args = JSON.stringify(JSON.parse(args), null, 2); } catch {}
      return `
    <div class="tool-call-item">
      <div class="tool-call-name">${esc(name)}</div>
      <div class="tool-call-args">${esc(args)}</div>
    </div>`;
    }).join('');
    html += `
  <div class="tool-calls-block">
    <div class="tool-calls-toggle open" onclick="toggleBlock(this)">Tool Calls (${toolCalls.length})</div>
    <div class="tool-calls-body open">${itemsHtml}</div>
  </div>`;
  }

  html += '</div>';
  return html;
}

function toggleBlock(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function switchTab(el) {
  document.querySelectorAll('.tb').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const panel = document.getElementById('panel-' + el.dataset.panel);
  if (panel) panel.classList.add('active');
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function escAttr(s) {
  return String(s || '').replace(/'/g, '&#39;');
}

function copyText(text, btn) {
  const feedback = ok => {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = ok ? '已复制' : '失败';
    btn.style.color = ok ? 'var(--accent)' : '#e55';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.color = '';
    }, 1500);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => feedback(true), () => fallbackCopy(text, feedback));
  } else {
    fallbackCopy(text, feedback);
  }
}

function fallbackCopy(text, feedback) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    feedback(ok);
  } catch {
    feedback(false);
  }
}

function clearFilters() {
  document.getElementById('filter-query').value = '';
  document.getElementById('filter-path').value = '';
  document.getElementById('filter-ip').value = '';
  document.getElementById('filter-status').value = 'all';
  refreshSidebar();
}

async function clearHistory() {
  try {
    await fetch('/api/records', { method: 'DELETE' });
  } catch {
    return;
  }
  currentSessionId = null;
  currentSession = null;
  currentRecord = null;
  currentRecordId = null;
  history.replaceState(null, '', '/');
  document.getElementById('empty').style.display = 'flex';
  document.getElementById('detail').style.display = 'none';
  await refreshSidebar();
}

(async () => {
  ['filter-query', 'filter-path', 'filter-ip', 'filter-status'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => { refreshSidebar(); });
    el.addEventListener('change', () => { refreshSidebar(); });
  });

  await refreshSidebar();
  const sessionId = await sessionIdFromUrl();
  const route = routeFromUrl();
  if (route && route.type === 'record') {
    currentRecordId = route.id;
    currentSessionId = sessionId;
    if (currentSessionId) {
      await refreshSidebar();
      await refreshCurrentSession();
    }
  } else if (sessionId) {
    await selectSession(sessionId);
  }
  setInterval(async () => {
    await refreshSidebar();
    if (currentSessionNeedsRefresh()) {
      await refreshCurrentSession();
    }
  }, 5000);
})();
</script>
